<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>Circle Mask Reveal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }
        #wrap { position: relative; }
        canvas {
            cursor: pointer;
            touch-action: none;
            display: block;
        }
        .ctrl-btn {
            position: absolute;
            top: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            touch-action: manipulation;
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.25); }
        .ctrl-btn.on { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.25); }
        #bgToggle { right: 10px; }
        #cometToggle { right: 48px; font-size: 11px; }
        #burstToggle { right: 86px; font-size: 11px; }
        #bgLabel {
            position: absolute;
            top: 14px;
            right: 124px;
            color: rgba(255,255,255,0.4);
            font: 400 11px sans-serif;
            z-index: 10;
            pointer-events: none;
        }
        #trailToggle { left: 10px; font-size: 11px; font-weight: 700; }
        #coverToggle { left: 48px; }
        #coverLabel {
            position: absolute;
            top: 14px;
            left: 86px;
            color: rgba(255,255,255,0.4);
            font: 400 11px sans-serif;
            z-index: 10;
            pointer-events: none;
        }
        /* comet element */
        #comet {
            position: absolute;
            width: 88px;
            height: 88px;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
            transform: translate(-50%, -50%);
        }
        #comet.visible { opacity: 1; }
        #comet .ring-outer {
            position: absolute;
            left: 15.19%;
            right: 16.25%;
            top: 15.54%;
            bottom: 15.98%;
            border-radius: 50%;
            background: rgba(128, 128, 128, 0.6);
            box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            transition: opacity 0.15s;
        }
        #comet .ring-inner {
            position: absolute;
            left: 28.9%;
            right: 29.96%;
            top: 29.23%;
            bottom: 29.68%;
            border-radius: 50%;
            background: #fff;
        }
        #comet.held .ring-outer { opacity: 0; }
        #comet.fading {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <canvas id="canvas" width="540" height="620"></canvas>
        <div id="comet">
            <div class="ring-outer"></div>
            <div class="ring-inner"></div>
        </div>
        <span id="bgLabel">1 / 5</span>
        <button id="burstToggle" class="ctrl-btn">&#x2605;</button>
        <button id="cometToggle" class="ctrl-btn">&#x2604;</button>
        <button id="bgToggle" class="ctrl-btn">&#x25B6;</button>
        <button id="trailToggle" class="ctrl-btn">&#x2013;</button>
        <button id="coverToggle" class="ctrl-btn">&#x25C0;</button>
        <span id="coverLabel">1 / 5</span>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cometEl = document.getElementById('comet');
        const wrap = document.getElementById('wrap');

        const W = 540, H = 620;
        const COLS = 20, ROWS = 24;
        const BASE_RADIUS = 0;
        const MAX_RADIUS = 50;
        const PEEK_RADIUS = 28;
        const TOUCH_RADIUS = 40;
        const TRAIL_INNER = 40;
        const TRAIL_OUTER = 70;
        const TRAIL_INNER_COMET = 30;
        const TRAIL_OUTER_COMET = 50;
        const SWIPE_THRESHOLD = 90;
        const EASE = 0.08;
        const RETRACT_EASE = 0.19;
        const TRAIL_DECAY        = 0.993; // exclusion/accent dot fade
        const TRAIL_DECAY_HELD   = 0.965; // while held
        const TARGET_TRAIL_DECAY = 0.96;  // how fast reveal circles shrink after comet moves past
        const COMET_SIZE = 88;
        const COMET_HIT = 60;
        const UNLOCK_SPEED = 0.82; // px per ms — crosses ~820px in 1000ms

        const spacing = Math.min(W / COLS, H / ROWS);
        const gridW = COLS * spacing;
        const gridH = ROWS * spacing;
        const ox = (W - gridW) / 2 + spacing / 2;
        const oy = (H - gridH) / 2 + spacing / 2;
        const TRAIL_DOT = spacing * 0.35;

        // comet rest position — centered horizontally, bottom area of grid
        const COMET_REST_X = W / 2;
        const COMET_REST_Y = oy + (ROWS - 4) * spacing;
        let cometX = COMET_REST_X;
        let cometY = COMET_REST_Y;

        const circles = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                circles.push({
                    x: ox + c * spacing,
                    y: oy + r * spacing,
                    radius: BASE_RADIUS,
                    target: BASE_RADIUS,
                    trail: 0
                });
            }
        }

        let startY = null;
        let isPointerHeld = false;
        let lastPx = W / 2, lastPy = H / 2;
        let unlockTime = null;
        let unlocked = false;
        let cometMode = true;
        let burstMode = false;
        let exclusionMode = false;
        let accentMode = false;
        let accentColor = '#ffffff';

        // --- accent color extraction ---
        function _getLum(r, g, b) {
            const f = c => { c /= 255; return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
            return 0.2126 * f(r) + 0.7152 * f(g) + 0.0722 * f(b);
        }
        function _contrast(l1, l2) { return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05); }
        function _hsl2rgb(h, s, l) {
            s /= 100; l /= 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
            return [f(0) * 255, f(8) * 255, f(4) * 255];
        }
        function computeAccentColor() {
            const data = coverCtx.getImageData(0, 0, W, H).data;
            const hBuckets = new Float32Array(36);
            let totalLum = 0, n = 0;
            for (let i = 0; i < data.length; i += 4 * 8) {
                const r = data[i], g = data[i+1], b = data[i+2];
                totalLum += _getLum(r, g, b);
                n++;
                const rn = r/255, gn = g/255, bn = b/255;
                const max = Math.max(rn, gn, bn), min = Math.min(rn, gn, bn), d = max - min;
                if (d > 0.12) {
                    const l2 = (max + min) / 2;
                    let h;
                    if (max === rn)      h = (((gn - bn) / d) % 6) * 60;
                    else if (max === gn) h = ((bn - rn) / d + 2) * 60;
                    else                 h = ((rn - gn) / d + 4) * 60;
                    if (h < 0) h += 360;
                    hBuckets[Math.floor(h / 10) % 36] += d / (1 - Math.abs(2 * l2 - 1) + 0.001);
                }
            }
            const avgLum = totalLum / n;
            let maxIdx = 0;
            for (let i = 1; i < 36; i++) if (hBuckets[i] > hBuckets[maxIdx]) maxIdx = i;
            const total = hBuckets.reduce((a, b) => a + b, 0);
            const hue = (total > 0 && hBuckets[maxIdx] / total > 0.1) ? maxIdx * 10 + 5 : 215;

            if (avgLum < 0.45) {
                // dark/midtone bg → find lowest L (most chromatic) that still hits AA 4.5:1
                for (let sl = 55; sl <= 97; sl++) {
                    const [r, g, b] = _hsl2rgb(hue, 95, sl);
                    if (_contrast(_getLum(r, g, b), avgLum) >= 4.5) return `hsl(${hue},95%,${sl}%)`;
                }
                return `hsl(${hue},95%,65%)`;
            } else {
                // light bg → find highest L (most chromatic) that still hits AA 4.5:1
                for (let sl = 45; sl >= 3; sl--) {
                    const [r, g, b] = _hsl2rgb(hue, 95, sl);
                    if (_contrast(avgLum, _getLum(r, g, b)) >= 4.5) return `hsl(${hue},95%,${sl}%)`;
                }
                return `hsl(${hue},95%,30%)`;
            }
        }

        const burstToggleBtn = document.getElementById('burstToggle');
        burstToggleBtn.addEventListener('click', e => {
            e.stopPropagation();
            burstMode = !burstMode;
            burstToggleBtn.classList.toggle('on', burstMode);
        });
        let draggingComet = false;

        function positionCometEl(x, y) {
            cometEl.style.left = x + 'px';
            cometEl.style.top = y + 'px';
        }
        positionCometEl(COMET_REST_X, COMET_REST_Y);

        // --- comet toggle ---
        const cometToggleBtn = document.getElementById('cometToggle');
        cometToggleBtn.addEventListener('click', e => {
            e.stopPropagation();
            cometMode = !cometMode;
            cometToggleBtn.classList.toggle('on', cometMode);
            if (cometMode) {
                cometX = COMET_REST_X;
                cometY = COMET_REST_Y;
                positionCometEl(cometX, cometY);
                cometEl.classList.remove('fading', 'held');
                cometEl.classList.add('visible');
            } else {
                cometEl.classList.remove('visible', 'held');
                draggingComet = false;
            }
        });

        // --- background management ---
        const bgPaths = [
            null,
            'bgs/Frame 2609175.png',
            'bgs/Frame 2609176.png',
            'bgs/Frame 2609178.png',
            'bgs/Group 5.png',
            'bgs/Frame 2609179.png',
            'bgs/Frame 2609180.png',
            'bgs/Home w widgets.png'
        ];
        let currentBgIndex = 7;

        const homeBg = document.createElement('canvas');
        homeBg.width = W;
        homeBg.height = H;
        const homeCtx = homeBg.getContext('2d');

        const homeExcl = document.createElement('canvas');
        homeExcl.width = W;
        homeExcl.height = H;
        const exclCtx = homeExcl.getContext('2d');

        // cover / lock screen
        const cover = document.createElement('canvas');
        cover.width = W;
        cover.height = H;
        const coverCtx = cover.getContext('2d');

        function drawCover(img) {
            coverCtx.clearRect(0, 0, W, H);
            if (img) {
                const scale = Math.max(W / img.width, H / img.height);
                const sw = img.width * scale;
                const sh = img.height * scale;
                coverCtx.drawImage(img, (W - sw) / 2, (H - sh) / 2, sw, sh);
            } else {
                coverCtx.fillStyle = '#0a0a0e';
                coverCtx.fillRect(0, 0, W, H);
            }

            coverCtx.fillStyle = '#c8c8c8';
            coverCtx.font = '600 96px "SF Mono", "Cascadia Code", "Consolas", monospace';
            coverCtx.textAlign = 'center';
            coverCtx.textBaseline = 'middle';
            coverCtx.fillText('12:30', W / 2, H * 0.28);

            coverCtx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            coverCtx.font = '400 12px sans-serif';
            coverCtx.fillText('swipe up to unlock', W / 2, H * 0.88 + 20);
        }

        function drawDefaultBg() {
            const g = homeCtx.createLinearGradient(0, 0, W, H);
            g.addColorStop(0, '#ff6b6b');
            g.addColorStop(0.3, '#ffd93d');
            g.addColorStop(0.5, '#6bcb77');
            g.addColorStop(0.7, '#4d96ff');
            g.addColorStop(1, '#9b59b6');
            homeCtx.fillStyle = g;
            homeCtx.fillRect(0, 0, W, H);

            for (let i = 0; i < 12; i++) {
                homeCtx.beginPath();
                homeCtx.arc(
                    80 + Math.random() * (W - 160),
                    80 + Math.random() * (H - 160),
                    30 + Math.random() * 60, 0, Math.PI * 2
                );
                homeCtx.fillStyle = `hsla(${Math.random() * 360}, 70%, 60%, 0.4)`;
                homeCtx.fill();
            }
            bakeExclusion();
        }

        function bakeExclusion() {
            exclCtx.clearRect(0, 0, W, H);
            exclCtx.drawImage(homeBg, 0, 0);
            exclCtx.globalCompositeOperation = 'exclusion';
            exclCtx.fillStyle = '#ffffff';
            exclCtx.fillRect(0, 0, W, H);
            exclCtx.globalCompositeOperation = 'source-over';
        }

        let currentCoverIndex = 1;

        function loadCover(index) {
            if (index === 0) {
                drawCover(null);
                if (accentMode) accentColor = computeAccentColor();
                return;
            }
            const img = new Image();
            img.onload = () => {
                drawCover(img);
                if (accentMode) accentColor = computeAccentColor();
            };
            img.src = bgPaths[index];
        }

        function loadBg(index) {
            if (index === 0) {
                drawDefaultBg();
                resetState();
                return;
            }
            const img = new Image();
            img.onload = () => {
                homeCtx.clearRect(0, 0, W, H);
                const scale = Math.max(W / img.width, H / img.height);
                const sw = img.width * scale;
                const sh = img.height * scale;
                homeCtx.drawImage(img, (W - sw) / 2, (H - sh) / 2, sw, sh);
                bakeExclusion();
                resetState();
            };
            img.src = bgPaths[index];
        }

        function resetState() {
            unlocked = false;
            unlockTime = null;
            draggingComet = false;
            for (const c of circles) {
                c.radius = BASE_RADIUS;
                c.target = BASE_RADIUS;
                c.trail = 0;
            }
            if (cometMode) {
                cometX = COMET_REST_X;
                cometY = COMET_REST_Y;
                positionCometEl(cometX, cometY);
                cometEl.classList.remove('fading', 'held', 'visible');
                cometEl.style.transition = 'none';
                void cometEl.offsetWidth;
                cometEl.style.transition = '';
                cometEl.classList.add('visible');
            }
        }

        loadBg(currentBgIndex);
        loadCover(currentCoverIndex);

        const bgLabel = document.getElementById('bgLabel');
        function updateLabel() {
            bgLabel.textContent = `${currentBgIndex + 1} / ${bgPaths.length}`;
        }
        
        const coverLabel = document.getElementById('coverLabel');
        function updateCoverLabel() {
            coverLabel.textContent = `${currentCoverIndex + 1} / ${bgPaths.length}`;
        }

        // startup defaults: show correct label + active button state
        updateLabel();
        updateCoverLabel();
        cometToggleBtn.classList.add('on');

        document.getElementById('bgToggle').addEventListener('click', e => {
            e.stopPropagation();
            currentBgIndex = (currentBgIndex + 1) % bgPaths.length;
            loadBg(currentBgIndex);
            updateLabel();
        });

        document.getElementById('coverToggle').addEventListener('click', e => {
            e.stopPropagation();
            currentCoverIndex = (currentCoverIndex + 1) % bgPaths.length;
            loadCover(currentCoverIndex);
            updateCoverLabel();
        });

        const trailToggleBtn = document.getElementById('trailToggle');
        let trailMode = 0; // 0 = off, 1 = E (exclusion), 2 = A (accent)
        const trailLabels = ['–', 'E', 'A'];

        trailToggleBtn.addEventListener('click', e => {
            e.stopPropagation();
            trailMode = (trailMode + 1) % 3;
            exclusionMode = trailMode === 1;
            accentMode    = trailMode === 2;
            trailToggleBtn.textContent = trailLabels[trailMode];
            trailToggleBtn.classList.toggle('on', trailMode > 0);
            if (accentMode) accentColor = computeAccentColor();
        });

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                currentCoverIndex = (currentCoverIndex - 1 + bgPaths.length) % bgPaths.length;
                loadCover(currentCoverIndex);
                updateCoverLabel();
            } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                currentCoverIndex = (currentCoverIndex + 1) % bgPaths.length;
                loadCover(currentCoverIndex);
                updateCoverLabel();
            }
        });

        // cover / lock screen


        // offscreen buffers
        const masked = document.createElement('canvas');
        masked.width = W;
        masked.height = H;
        const maskedCtx = masked.getContext('2d');

        const trailBuf = document.createElement('canvas');
        trailBuf.width = W;
        trailBuf.height = H;
        const trailCtx = trailBuf.getContext('2d');

        function poke(px, py) {
            if (unlocked) return;
            const tInner = cometMode ? TRAIL_INNER_COMET : TRAIL_INNER;
            const tOuter = cometMode ? TRAIL_OUTER_COMET : TRAIL_OUTER;
            for (const c of circles) {
                const d = Math.hypot(c.x - px, c.y - py);
                if (d < TOUCH_RADIUS) {
                    const t = 1 - d / TOUCH_RADIUS;
                    const newTarget = BASE_RADIUS + (PEEK_RADIUS - BASE_RADIUS) * t;
                    c.target = Math.max(c.target, Math.min(newTarget, PEEK_RADIUS));
                }
                if ((exclusionMode || accentMode) && d >= tInner && d < tOuter) {
                    const t = 1 - (d - tInner) / (tOuter - tInner);
                    c.trail = Math.max(c.trail, t);
                }
            }
        }

        function coords(e) {
            const rect = canvas.getBoundingClientRect();
            return [
                (e.clientX - rect.left) * (W / rect.width),
                (e.clientY - rect.top) * (H / rect.height)
            ];
        }

        function revealAll(fromX, fromY) {
            unlocked = true;
            lastPx = fromX;
            lastPy = fromY;
            for (const c of circles) c.trail = 0;
            if (burstMode) {
                // all circles fire at once
                for (const c of circles) c.target = MAX_RADIUS;
            } else {
                unlockTime = performance.now();
            }
            if (cometMode) {
                cometEl.classList.add('fading');
                cometEl.classList.remove('held');
                draggingComet = false;
            }
            setTimeout(resetState, 4000);
        }

        function retract() {
            for (const c of circles) c.target = BASE_RADIUS;
        }

        canvas.addEventListener('pointerdown', e => {
            isPointerHeld = true;
            canvas.setPointerCapture(e.pointerId);
            const [px, py] = coords(e);
            lastPx = px; lastPy = py;
            startY = py;

            if (cometMode && !unlocked) {
                // check if touching the comet
                const dist = Math.hypot(px - cometX, py - cometY);
                if (dist < COMET_HIT) {
                    draggingComet = true;
                    cometEl.classList.add('held');
                    poke(px, py);
                }
                // ignore taps elsewhere in comet mode
            } else {
                poke(px, py);
            }
        });
        canvas.addEventListener('pointermove', e => {
            if (e.pressure > 0) {
                const [px, py] = coords(e);
                lastPx = px; lastPy = py;

                if (cometMode && draggingComet) {
                    cometX = px;
                    cometY = py;
                    positionCometEl(cometX, cometY);
                    poke(px, py);
                    if (startY !== null && startY - py >= SWIPE_THRESHOLD) {
                        revealAll(px, py);
                        startY = null;
                    }
                } else if (!cometMode) {
                    poke(px, py);
                    if (startY !== null && startY - py >= SWIPE_THRESHOLD) {
                        revealAll(px, py);
                        startY = null;
                    }
                }
            }
        });
        canvas.addEventListener('pointerup', () => {
            isPointerHeld = false;
            startY = null;
            if (cometMode && draggingComet && !unlocked) {
                draggingComet = false;
                cometEl.classList.remove('held');
                // animate comet back to rest
                cometX = COMET_REST_X;
                cometY = COMET_REST_Y;
                cometEl.style.transition = 'left 0.3s, top 0.3s, opacity 0.3s';
                positionCometEl(cometX, cometY);
                setTimeout(() => { cometEl.style.transition = 'opacity 0.3s'; }, 300);
                // targets decay via draw loop — no hard retract needed
            }
        });

        (function draw() {
            // linear radial unlock wave
            if (unlockTime !== null) {
                const elapsed = performance.now() - unlockTime;
                const waveRadius = elapsed * UNLOCK_SPEED;
                for (const c of circles) {
                    const d = Math.hypot(c.x - lastPx, c.y - lastPy);
                    if (d <= waveRadius && c.target < MAX_RADIUS) {
                        c.target = MAX_RADIUS;
                    }
                }
            }

            let hasTrail = false;
            let hasReveal = false;
            for (const c of circles) {
                // gradually decay reveal targets so circles trail behind the comet
                if (!unlocked) {
                    c.target *= TARGET_TRAIL_DECAY;
                    if (c.target < 0.5) c.target = 0;
                }
                const ease = c.target < c.radius ? RETRACT_EASE : EASE;
                c.radius += (c.target - c.radius) * ease;
                if (c.radius < 0.1) c.radius = 0;
                if (c.radius > 0) hasReveal = true;

                c.trail *= isPointerHeld ? TRAIL_DECAY_HELD : TRAIL_DECAY;
                if (c.trail < 0.005) c.trail = 0;
                if (c.trail > 0) hasTrail = true;
            }

            // composite: start with cover
            ctx.clearRect(0, 0, W, H);
            ctx.drawImage(cover, 0, 0);

            // build masked reveal (wallpaper OR solid accent) through circle dots
            if (hasReveal) {
                maskedCtx.clearRect(0, 0, W, H);
                if (accentMode && !unlocked) {
                    maskedCtx.fillStyle = accentColor;
                    maskedCtx.fillRect(0, 0, W, H);
                } else {
                    maskedCtx.drawImage(homeBg, 0, 0);
                }
                maskedCtx.save();
                maskedCtx.globalCompositeOperation = 'destination-in';
                maskedCtx.beginPath();
                for (const c of circles) {
                    if (c.radius > 0.1) {
                        maskedCtx.moveTo(c.x + c.radius, c.y);
                        maskedCtx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                    }
                }
                maskedCtx.fillStyle = '#fff';
                maskedCtx.fill();
                maskedCtx.restore();
                ctx.drawImage(masked, 0, 0);
            }

            // trail rendering — exclusion (inverted wallpaper) or accent (solid colour)
            if (hasTrail) {
                trailCtx.clearRect(0, 0, W, H);

                if (accentMode) {
                    // solid accent colour dots, always visible regardless of circle radius
                    for (const c of circles) {
                        if (c.trail > 0) {
                            const r = TRAIL_DOT * c.trail;
                            trailCtx.globalAlpha = c.trail * 0.9;
                            trailCtx.fillStyle = accentColor;
                            trailCtx.beginPath();
                            trailCtx.arc(c.x, c.y, r, 0, Math.PI * 2);
                            trailCtx.fill();
                        }
                    }
                    trailCtx.globalAlpha = 1;
                } else {
                    // exclusion: inverted wallpaper masked to trail dots
                    trailCtx.drawImage(homeExcl, 0, 0);
                    trailCtx.save();
                    trailCtx.globalCompositeOperation = 'destination-in';
                    trailCtx.beginPath();
                    for (const c of circles) {
                        if (c.trail > 0) {
                            const r = TRAIL_DOT * c.trail;
                            trailCtx.moveTo(c.x + r, c.y);
                            trailCtx.arc(c.x, c.y, r, 0, Math.PI * 2);
                        }
                    }
                    trailCtx.fillStyle = '#fff';
                    trailCtx.fill();
                    trailCtx.restore();
                    trailCtx.save();
                    trailCtx.globalCompositeOperation = 'destination-out';
                    for (const c of circles) {
                        if (c.trail > 0 && c.trail < 1) {
                            const r = TRAIL_DOT * c.trail;
                            trailCtx.beginPath();
                            trailCtx.arc(c.x, c.y, r, 0, Math.PI * 2);
                            trailCtx.fillStyle = `rgba(0,0,0,${1 - c.trail})`;
                            trailCtx.fill();
                        }
                    }
                    trailCtx.restore();
                }

                ctx.drawImage(trailBuf, 0, 0);
            }

            requestAnimationFrame(draw);
        })();
    </script>
</body>
</html>
