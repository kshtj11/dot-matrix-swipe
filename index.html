<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>Circle Mask Reveal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }
        #wrap { position: relative; }
        canvas {
            cursor: pointer;
            touch-action: none;
            display: block;
        }
        .ctrl-btn {
            position: absolute;
            top: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            touch-action: manipulation;
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.25); }
        .ctrl-btn.on { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.25); }
        #bgToggle { right: 10px; }
        #cometToggle { right: 48px; font-size: 11px; }
        #bgLabel {
            position: absolute;
            top: 14px;
            right: 86px;
            color: rgba(255,255,255,0.4);
            font: 400 11px sans-serif;
            z-index: 10;
            pointer-events: none;
        }
        /* comet launcher element */
        #comet {
            position: absolute;
            left: 226px;
            top: 506px;
            width: 88px;
            height: 88px;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #comet.visible { opacity: 1; }
        #comet .ring-outer {
            position: absolute;
            left: 15.19%;
            right: 16.25%;
            top: 15.54%;
            bottom: 15.98%;
            border-radius: 50%;
            background: rgba(128, 128, 128, 0.6);
            box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        #comet .ring-inner {
            position: absolute;
            left: 28.9%;
            right: 29.96%;
            top: 29.23%;
            bottom: 29.68%;
            border-radius: 50%;
            background: #fff;
        }
        #comet.fading {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <canvas id="canvas" width="540" height="620"></canvas>
        <div id="comet">
            <div class="ring-outer"></div>
            <div class="ring-inner"></div>
        </div>
        <span id="bgLabel">1 / 5</span>
        <button id="cometToggle" class="ctrl-btn">&#x2604;</button>
        <button id="bgToggle" class="ctrl-btn">&#x25B6;</button>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cometEl = document.getElementById('comet');

        const W = 540, H = 620;
        const COLS = 20, ROWS = 24;
        const BASE_RADIUS = 0;
        const MAX_RADIUS = 50;
        const PEEK_RADIUS = 28;
        const TOUCH_RADIUS = 40;
        const TRAIL_INNER = 40;
        const TRAIL_OUTER = 70;
        const TRAIL_INNER_COMET = 30;
        const TRAIL_OUTER_COMET = 50;
        const SWIPE_THRESHOLD = 90;
        const EASE = 0.08;
        const RETRACT_EASE = 0.19;
        const TRAIL_DECAY = 0.985;

        const spacing = Math.min(W / COLS, H / ROWS);
        const gridW = COLS * spacing;
        const gridH = ROWS * spacing;
        const ox = (W - gridW) / 2 + spacing / 2;
        const oy = (H - gridH) / 2 + spacing / 2;
        const TRAIL_DOT = spacing * 0.35;

        const circles = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                circles.push({
                    x: ox + c * spacing,
                    y: oy + r * spacing,
                    radius: BASE_RADIUS,
                    target: BASE_RADIUS,
                    trail: 0
                });
            }
        }

        let startY = null;
        let lastPx = W / 2, lastPy = H / 2;
        let unlockTime = null;
        const UNLOCK_SPEED = 0.6;
        let unlocked = false;
        let cometMode = false;

        // --- comet toggle ---
        const cometToggleBtn = document.getElementById('cometToggle');
        cometToggleBtn.addEventListener('click', e => {
            e.stopPropagation();
            cometMode = !cometMode;
            cometToggleBtn.classList.toggle('on', cometMode);
            if (cometMode) {
                cometEl.classList.add('visible');
                cometEl.classList.remove('fading');
            } else {
                cometEl.classList.remove('visible');
            }
        });

        // --- background management ---
        const bgPaths = [
            null,
            'bgs/Frame 2609175.png',
            'bgs/Frame 2609176.png',
            'bgs/Frame 2609178.png',
            'bgs/Group 5.png'
        ];
        let currentBgIndex = 0;

        const homeBg = document.createElement('canvas');
        homeBg.width = W;
        homeBg.height = H;
        const homeCtx = homeBg.getContext('2d');

        const homeExcl = document.createElement('canvas');
        homeExcl.width = W;
        homeExcl.height = H;
        const exclCtx = homeExcl.getContext('2d');

        function drawDefaultBg() {
            const g = homeCtx.createLinearGradient(0, 0, W, H);
            g.addColorStop(0, '#ff6b6b');
            g.addColorStop(0.3, '#ffd93d');
            g.addColorStop(0.5, '#6bcb77');
            g.addColorStop(0.7, '#4d96ff');
            g.addColorStop(1, '#9b59b6');
            homeCtx.fillStyle = g;
            homeCtx.fillRect(0, 0, W, H);

            for (let i = 0; i < 12; i++) {
                homeCtx.beginPath();
                homeCtx.arc(
                    80 + Math.random() * (W - 160),
                    80 + Math.random() * (H - 160),
                    30 + Math.random() * 60, 0, Math.PI * 2
                );
                homeCtx.fillStyle = `hsla(${Math.random() * 360}, 70%, 60%, 0.4)`;
                homeCtx.fill();
            }
            bakeExclusion();
        }

        function bakeExclusion() {
            exclCtx.clearRect(0, 0, W, H);
            exclCtx.drawImage(homeBg, 0, 0);
            exclCtx.globalCompositeOperation = 'exclusion';
            exclCtx.fillStyle = '#ffffff';
            exclCtx.fillRect(0, 0, W, H);
            exclCtx.globalCompositeOperation = 'source-over';
        }

        function loadBg(index) {
            if (index === 0) {
                drawDefaultBg();
                resetState();
                return;
            }
            const img = new Image();
            img.onload = () => {
                homeCtx.clearRect(0, 0, W, H);
                const scale = Math.max(W / img.width, H / img.height);
                const sw = img.width * scale;
                const sh = img.height * scale;
                homeCtx.drawImage(img, (W - sw) / 2, (H - sh) / 2, sw, sh);
                bakeExclusion();
                resetState();
            };
            img.src = bgPaths[index];
        }

        function resetState() {
            unlocked = false;
            unlockTime = null;
            for (const c of circles) {
                c.radius = BASE_RADIUS;
                c.target = BASE_RADIUS;
                c.trail = 0;
            }
            // restore comet if in comet mode
            if (cometMode) {
                cometEl.classList.remove('fading');
                cometEl.classList.add('visible');
            }
        }

        drawDefaultBg();

        const bgLabel = document.getElementById('bgLabel');
        function updateLabel() {
            bgLabel.textContent = `${currentBgIndex + 1} / ${bgPaths.length}`;
        }

        document.getElementById('bgToggle').addEventListener('click', e => {
            e.stopPropagation();
            currentBgIndex = (currentBgIndex + 1) % bgPaths.length;
            loadBg(currentBgIndex);
            updateLabel();
        });

        // cover / lock screen
        const cover = document.createElement('canvas');
        cover.width = W;
        cover.height = H;
        const coverCtx = cover.getContext('2d');

        coverCtx.fillStyle = '#0a0a0e';
        coverCtx.fillRect(0, 0, W, H);

        coverCtx.fillStyle = '#c8c8c8';
        coverCtx.font = '600 96px "SF Mono", "Cascadia Code", "Consolas", monospace';
        coverCtx.textAlign = 'center';
        coverCtx.textBaseline = 'middle';
        coverCtx.fillText('12:30', W / 2, H * 0.28);

        coverCtx.fillStyle = '#555';
        coverCtx.font = '400 12px sans-serif';
        coverCtx.fillText('swipe up to unlock', W / 2, H * 0.88);

        // offscreen buffers
        const masked = document.createElement('canvas');
        masked.width = W;
        masked.height = H;
        const maskedCtx = masked.getContext('2d');

        const trailBuf = document.createElement('canvas');
        trailBuf.width = W;
        trailBuf.height = H;
        const trailCtx = trailBuf.getContext('2d');

        function poke(px, py) {
            if (unlocked) return;
            const tInner = cometMode ? TRAIL_INNER_COMET : TRAIL_INNER;
            const tOuter = cometMode ? TRAIL_OUTER_COMET : TRAIL_OUTER;
            for (const c of circles) {
                const d = Math.hypot(c.x - px, c.y - py);
                if (d < TOUCH_RADIUS) {
                    const t = 1 - d / TOUCH_RADIUS;
                    const newTarget = BASE_RADIUS + (PEEK_RADIUS - BASE_RADIUS) * t;
                    c.target = Math.max(c.target, Math.min(newTarget, PEEK_RADIUS));
                }
                if (d >= tInner && d < tOuter) {
                    const t = 1 - (d - tInner) / (tOuter - tInner);
                    c.trail = Math.max(c.trail, t);
                }
            }
        }

        function coords(e) {
            const rect = canvas.getBoundingClientRect();
            return [
                (e.clientX - rect.left) * (W / rect.width),
                (e.clientY - rect.top) * (H / rect.height)
            ];
        }

        function revealAll(fromX, fromY) {
            unlockTime = performance.now();
            unlocked = true;
            lastPx = fromX;
            lastPy = fromY;
            for (const c of circles) c.trail = 0;
            // fade comet element on unlock
            if (cometMode) {
                cometEl.classList.add('fading');
            }
            setTimeout(resetState, 4000);
        }

        function retract() {
            for (const c of circles) c.target = BASE_RADIUS;
        }

        canvas.addEventListener('pointerdown', e => {
            canvas.setPointerCapture(e.pointerId);
            const [px, py] = coords(e);
            lastPx = px; lastPy = py;
            startY = py;
            poke(px, py);
        });
        canvas.addEventListener('pointermove', e => {
            if (e.pressure > 0) {
                const [px, py] = coords(e);
                lastPx = px; lastPy = py;
                poke(px, py);
                if (startY !== null && startY - py >= SWIPE_THRESHOLD) {
                    revealAll(px, py);
                    startY = null;
                }
            }
        });
        canvas.addEventListener('pointerup', () => {
            startY = null;
            if (!unlocked) retract();
        });

        (function draw() {
            // radial unlock wave
            if (unlockTime !== null) {
                const elapsed = performance.now() - unlockTime;
                const waveRadius = elapsed * UNLOCK_SPEED;
                for (const c of circles) {
                    const d = Math.hypot(c.x - lastPx, c.y - lastPy);
                    if (d <= waveRadius && c.target < MAX_RADIUS) {
                        c.target = MAX_RADIUS;
                    }
                }
            }

            let hasTrail = false;
            let hasReveal = false;
            for (const c of circles) {
                const ease = c.target < c.radius ? RETRACT_EASE : EASE;
                c.radius += (c.target - c.radius) * ease;
                if (c.radius < 0.1) c.radius = 0;
                if (c.radius > 0) hasReveal = true;

                c.trail *= TRAIL_DECAY;
                if (c.trail < 0.005) c.trail = 0;
                if (c.trail > 0) hasTrail = true;
            }

            // composite: start with cover
            ctx.clearRect(0, 0, W, H);
            ctx.drawImage(cover, 0, 0);

            // build masked home background (only when circles are visible)
            if (hasReveal) {
                maskedCtx.clearRect(0, 0, W, H);
                maskedCtx.drawImage(homeBg, 0, 0);
                maskedCtx.save();
                maskedCtx.globalCompositeOperation = 'destination-in';
                maskedCtx.beginPath();
                for (const c of circles) {
                    if (c.radius > 0.1) {
                        maskedCtx.moveTo(c.x + c.radius, c.y);
                        maskedCtx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                    }
                }
                maskedCtx.fillStyle = '#fff';
                maskedCtx.fill();
                maskedCtx.restore();
                ctx.drawImage(masked, 0, 0);
            }

            // exclusion trail — only when active, skip tap-area circles
            if (hasTrail) {
                trailCtx.clearRect(0, 0, W, H);
                trailCtx.drawImage(homeExcl, 0, 0);
                trailCtx.save();
                trailCtx.globalCompositeOperation = 'destination-in';
                trailCtx.beginPath();
                for (const c of circles) {
                    if (c.trail > 0 && c.radius < 0.5) {
                        const r = TRAIL_DOT * c.trail;
                        trailCtx.moveTo(c.x + r, c.y);
                        trailCtx.arc(c.x, c.y, r, 0, Math.PI * 2);
                    }
                }
                trailCtx.fillStyle = '#fff';
                trailCtx.fill();
                trailCtx.restore();
                trailCtx.save();
                trailCtx.globalCompositeOperation = 'destination-out';
                for (const c of circles) {
                    if (c.trail > 0 && c.trail < 1 && c.radius < 0.5) {
                        const r = TRAIL_DOT * c.trail;
                        trailCtx.beginPath();
                        trailCtx.arc(c.x, c.y, r, 0, Math.PI * 2);
                        trailCtx.fillStyle = `rgba(0,0,0,${1 - c.trail})`;
                        trailCtx.fill();
                    }
                }
                trailCtx.restore();

                ctx.drawImage(trailBuf, 0, 0);
            }

            requestAnimationFrame(draw);
        })();
    </script>
</body>
</html>
